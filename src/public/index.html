<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型中转测试工具</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>模型中转测试工具</h1>
    <span class="tag">v1.0</span>
  </div>

  <!-- Config -->
  <div class="card">
    <h2>配置</h2>
    <div class="form-grid">
      <div>
        <label>基础地址（不含 /v1）</label>
        <div style="display:flex;gap:6px;">
          <select id="baseUrlPreset" style="width:auto;min-width:120px;" onchange="onBaseUrlPresetChange()">
            <option value="https://api.favorais.com">api.favorais.com</option>
            <option value="__custom__">自定义...</option>
          </select>
          <input type="text" id="baseUrl" placeholder="https://api.example.com">
        </div>
      </div>
      <div>
        <label>服务商</label>
        <select id="provider">
          <option value="">自动检测</option>
          <option value="openai">OpenAI</option>
          <option value="claude">Claude (Anthropic)</option>
          <option value="gemini">Gemini (Google)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>模型 ID</label>
        <input type="text" id="modelId" placeholder="claude-opus-4-6" list="modelList">
        <datalist id="modelList"></datalist>
      </div>
      <div>
        <label>API 密钥 / 令牌</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
    </div>
    <div id="modelBar" class="model-bar hidden"></div>
    <div class="mt8" style="display:flex;flex-wrap:wrap;gap:16px;">
      <div>
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text);">
          <input type="checkbox" id="useStreaming" style="width:auto;accent-color:var(--accent);">
          流式请求
        </label>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;margin-left:22px;">
          所有测试均使用 stream: true 发送请求
        </div>
      </div>
      <div id="claudeCodeCLIOption" class="hidden" style="display:none;">
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text);">
          <input type="checkbox" id="simulateClaudeCodeCLI" style="width:auto;accent-color:var(--accent);">
          模拟 Claude Code CLI 工具请求
        </label>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;margin-left:22px;">
          携带 CLI 专属 Headers（User-Agent、Anthropic-Beta、X-App 等）
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Request -->
  <div class="card" style="padding:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none;" onclick="toggleCustomBody()">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge" id="customBadge" style="display:none;"></span>
        <h2 style="margin:0;font-size:15px;">自定义请求</h2>
        <span class="duration" id="customDur"></span>
      </div>
      <span style="font-size:11px;color:var(--text2);" id="customToggleHint">展开 ▼</span>
    </div>
    <div class="test-body" id="customBody">
      <div style="padding:0 20px 16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <label style="margin:0;">请求体 JSON（根据模型自动生成原生格式，可自行修改）</label>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm" onclick="event.stopPropagation();generateCustomJSON()">重新生成</button>
            <button class="btn btn-sm btn-primary" id="customSendBtn" onclick="event.stopPropagation();sendCustomRequest()">发送请求</button>
          </div>
        </div>
        <textarea id="customJSON" rows="12" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text);resize:vertical;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;line-height:1.5;background:#f6f8fa;" spellcheck="false"></textarea>
        <div id="customResult" class="mt8" style="display:none;">
          <div style="display:flex;gap:8px;margin-bottom:6px;">
            <button class="btn btn-sm" onclick="switchCustomTab('resp')" id="customTabResp" style="font-weight:500;">响应内容</button>
            <button class="btn btn-sm" onclick="switchCustomTab('raw')" id="customTabRaw">原始响应</button>
            <button class="btn btn-sm" onclick="copyCustomResult()">复制</button>
          </div>
          <div id="customRespContent" class="raw-block" style="max-height:300px;overflow-y:auto;"></div>
          <div id="customRawContent" class="raw-block" style="max-height:300px;overflow-y:auto;display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tests -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0">测试项目</h2>
      <div>
        <button class="btn btn-primary" id="runAllBtn" onclick="runAllTests()">全部测试</button>
      </div>
    </div>
    <div class="test-grid mt12" id="testGrid"></div>
  </div>

  <!-- Summary -->
  <div class="card hidden" id="summaryCard">
    <h2>汇总</h2>
    <div class="summary-bar" id="summaryBar"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
